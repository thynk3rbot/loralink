<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev / QA — LoRaLink</title>
  <style>
    /* ── Reset & Variables ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0d0f12;
      --surface:  #161a1f;
      --border:   #252b33;
      --dim:      #4a5568;
      --text:     #cdd6e0;
      --bright:   #eaf2fb;
      --accent:   #3b9eff;
      --green:    #3ecf8e;
      --yellow:   #f6c90e;
      --red:      #e05252;
      --mono:     'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --sans:     -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --hdr-h:    44px;
      --status-h: 32px;
      --cmd-w:    280px;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; }

    /* ── Debug ID overlay (CSS-only, always in DOM, toggled by body class) ─ */
    body.debug-ids [data-debug-id] { position: relative; outline: 1px dashed rgba(246,201,14,0.3); }
    body.debug-ids [data-debug-id]::after {
      content: attr(data-debug-id);
      position: absolute; top: 0; right: 0; z-index: 9999;
      font: 700 8px/1 var(--mono);
      background: var(--yellow); color: #000;
      padding: 1px 3px; border-radius: 0 0 0 3px;
      pointer-events: none; white-space: nowrap;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    #dq-hdr    { height: var(--hdr-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 10px; flex-shrink: 0; }
    #dq-main   { display: flex; height: calc(100vh - var(--hdr-h) - var(--status-h)); overflow: hidden; }
    #dq-status { height: var(--status-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; overflow: hidden; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .hdr-brand { font-weight: 700; color: var(--bright); font-size: 14px; letter-spacing: .03em; white-space: nowrap; }
    .hdr-sep   { width: 1px; height: 20px; background: var(--border); }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #dq-nav    { display: flex; gap: 4px; }
    .nav-link  { color: var(--dim); text-decoration: none; font-size: 12px; padding: 3px 8px; border-radius: 4px; transition: background .15s, color .15s; }
    .nav-link:hover  { background: var(--border); color: var(--text); }
    .nav-link.active { color: var(--accent); }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge { font: 700 11px/1 var(--mono); padding: 3px 7px; border-radius: 4px; background: var(--border); color: var(--dim); white-space: nowrap; }
    .badge.ok  { background: rgba(62,207,142,.15); color: var(--green); }
    .badge.err { background: rgba(224,82,82,.15);  color: var(--red); }
    .badge.unk { background: var(--border); color: var(--dim); }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn { cursor: pointer; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); color: var(--text); padding: 4px 10px; font-size: 12px; transition: background .12s, border-color .12s; }
    .btn:hover   { background: var(--border); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: #2d8be6; }
    .btn.active  { border-color: var(--accent); color: var(--accent); }
    .btn.sm      { padding: 2px 7px; font-size: 11px; }
    .micro-btn   { cursor: pointer; background: none; border: none; color: var(--dim); font-size: 10px; padding: 0 4px; }
    .micro-btn:hover { color: var(--text); }

    /* ── Device select ───────────────────────────────────────────────────── */
    #dq-device-select {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; padding: 3px 8px; font-size: 12px; cursor: pointer; max-width: 180px;
    }

    /* ── CMD panel ───────────────────────────────────────────────────────── */
    #dq-cmd {
      width: var(--cmd-w); flex-shrink: 0; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .cmd-section  { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .cmd-label    { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--dim); text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .tp-pills     { display: flex; gap: 4px; flex-wrap: wrap; }
    .tp-pills .btn { padding: 3px 9px; font-size: 11px; }
    .input-row    { display: flex; gap: 6px; }
    #dq-cmd-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--bright);
      border-radius: 5px; padding: 5px 9px; font: 13px var(--mono); outline: none;
      transition: border-color .15s;
    }
    #dq-cmd-input:focus { border-color: var(--accent); }
    .palette-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .palette-btn  { font: 11px var(--mono); padding: 2px 7px; cursor: pointer; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; }
    .palette-btn:hover { border-color: var(--accent); color: var(--accent); }
    #dq-history-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 10px 12px; }
    #dq-history-section .cmd-label { margin-bottom: 6px; }
    #dq-history-list { flex: 1; overflow-y: auto; font: 11px var(--mono); list-style: none; }
    #dq-history-list li { padding: 3px 6px; border-radius: 3px; cursor: pointer; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #dq-history-list li:hover { background: var(--border); color: var(--text); }
    #dq-history-list li::before { content: '▸ '; color: var(--accent); }

    /* ── LOG panel ───────────────────────────────────────────────────────── */
    #dq-log { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #dq-log-toolbar {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface);
    }
    #dq-log-filter {
      flex: 1; max-width: 220px; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 4px; padding: 3px 8px; font: 12px var(--mono); outline: none;
    }
    #dq-log-filter:focus { border-color: var(--accent); }
    #dq-log-count { margin-left: auto; font: 11px var(--mono); color: var(--dim); }
    #dq-log-output { flex: 1; overflow-y: auto; padding: 8px 12px; font: 12px/1.6 var(--mono); }
    .log-line { display: flex; gap: 8px; padding: 1px 0; }
    .log-line.hidden { display: none; }
    .log-ts   { color: var(--dim); flex-shrink: 0; }
    .log-dir  { flex-shrink: 0; width: 14px; text-align: center; }
    .log-dir.out { color: var(--accent); }
    .log-dir.in  { color: var(--green); }
    .log-dir.sys { color: var(--yellow); }
    .log-dir.err { color: var(--red); }
    .log-body     { color: var(--text); word-break: break-all; }
    .log-body.cmd { color: var(--bright); font-weight: 600; }

    /* ── Status bar ──────────────────────────────────────────────────────── */
    #dq-status-fields { display: flex; gap: 14px; overflow: hidden; font: 11px var(--mono); }
    .sf      { display: flex; gap: 4px; white-space: nowrap; }
    .sf-key  { color: var(--dim); }
    .sf-val  { color: var(--bright); }
    .sf-val.ok  { color: var(--green); }
    .sf-val.err { color: var(--red); }

    /* ── AI Suggestion panel ─────────────────────────────────────────────── */
    .suggest-box {
      border: 1px solid var(--border); border-radius: 5px; padding: 7px 10px;
      cursor: pointer; transition: border-color .15s, background .15s;
      min-height: 36px;
    }
    .suggest-box:hover { border-color: var(--accent); background: rgba(59,158,255,.06); }
    .suggest-cmd    { display: block; font: 600 12px var(--mono); color: var(--bright); }
    .suggest-reason { display: block; font: 11px var(--sans); color: var(--dim); margin-top: 3px; }
    .suggest-spin   { font: 11px var(--mono); color: var(--yellow); margin-left: 4px; }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════ HEADER -->
<header id="dq-hdr" data-debug-id="DQ-HDR">
  <span class="hdr-brand" data-debug-id="DQ-HDR-TITLE">Dev / QA</span>
  <div class="hdr-sep"></div>

  <select id="dq-device-select" data-debug-id="DQ-HDR-DEVICE"
          title="Select target device" onchange="onDeviceChange(this.value)">
    <option value="">— no device —</option>
  </select>

  <span id="dq-transport-badge" data-debug-id="DQ-HDR-TRANSPORT" class="badge unk">transport: --</span>
  <span id="dq-ws-badge"        data-debug-id="DQ-HDR-WS"        class="badge unk">WS ●</span>

  <div class="hdr-sep"></div>

  <nav id="dq-nav" data-debug-id="DQ-HDR-NAV">
    <a href="/"                        class="nav-link" data-debug-id="DQ-NAV-FLEET">Fleet Admin</a>
    <a href="/product-builder"         class="nav-link" data-debug-id="DQ-NAV-BUILDER">Product Builder</a>
    <a href="/static/scheduler.html"   class="nav-link" data-debug-id="DQ-NAV-SCHED">Scheduler</a>
    <a href="/static/mqtt_dashboard.html" class="nav-link" data-debug-id="DQ-NAV-MQTT">MQTT</a>
    <a href="/static/devqa.html"       class="nav-link active" data-debug-id="DQ-NAV-DEVQA">Dev / QA</a>
  </nav>

  <div class="hdr-right" data-debug-id="DQ-HDR-RIGHT">
    <button class="btn sm" id="dq-debug-btn" data-debug-id="DQ-HDR-DEBUG"
            onclick="toggleDebugIds()" title="Toggle debug ID overlays on all elements">Debug IDs</button>
  </div>
</header>

<!-- ════════════════════════════════════════ MAIN -->
<main id="dq-main" data-debug-id="DQ-MAIN">

  <!-- ── CMD Panel ──────────────────────────────────────── -->
  <section id="dq-cmd" data-debug-id="DQ-CMD">

    <div class="cmd-section" data-debug-id="DQ-CMD-TRANSPORT">
      <div class="cmd-label">Transport</div>
      <div class="tp-pills" data-debug-id="DQ-CMD-TP-PILLS">
        <button class="btn active" data-debug-id="DQ-CMD-TP-AUTO"   onclick="setTransport('auto',   this)">Auto</button>
        <button class="btn"        data-debug-id="DQ-CMD-TP-HTTP"   onclick="setTransport('http',   this)">HTTP</button>
        <button class="btn"        data-debug-id="DQ-CMD-TP-BLE"    onclick="setTransport('ble',    this)">BLE</button>
        <button class="btn"        data-debug-id="DQ-CMD-TP-SERIAL" onclick="setTransport('serial', this)">Serial</button>
      </div>
    </div>

    <div class="cmd-section" data-debug-id="DQ-CMD-INPUT-AREA">
      <div class="cmd-label">Command</div>
      <div class="input-row" data-debug-id="DQ-CMD-INPUT-ROW">
        <input id="dq-cmd-input" data-debug-id="DQ-CMD-INPUT"
               type="text" placeholder="e.g. STATUS"
               autocomplete="off" spellcheck="false"
               onkeydown="onCmdKey(event)" />
        <button class="btn primary" data-debug-id="DQ-CMD-SEND" onclick="sendCmd()">Send</button>
      </div>
    </div>

    <!-- AI suggestion panel -->
    <div class="cmd-section" id="dq-suggest-section" data-debug-id="DQ-CMD-SUGGEST">
      <div class="cmd-label">
        AI Suggestion
        <span id="dq-suggest-spinner" data-debug-id="DQ-CMD-SUGGEST-SPINNER" class="suggest-spin" style="display:none">…</span>
      </div>
      <div id="dq-suggest-box" data-debug-id="DQ-CMD-SUGGEST-BOX" class="suggest-box"
           title="Click to use this command" onclick="useSuggestion()">
        <span id="dq-suggest-cmd"    data-debug-id="DQ-CMD-SUGGEST-CMD"    class="suggest-cmd">—</span>
        <span id="dq-suggest-reason" data-debug-id="DQ-CMD-SUGGEST-REASON" class="suggest-reason"></span>
      </div>
    </div>

    <div class="cmd-section" data-debug-id="DQ-CMD-PALETTE">
      <div class="cmd-label">Quick Commands</div>
      <div id="dq-palette-grid" class="palette-grid" data-debug-id="DQ-CMD-PALETTE-GRID"></div>
    </div>

    <div id="dq-history-section" data-debug-id="DQ-CMD-HISTORY">
      <div class="cmd-label">
        History
        <button class="micro-btn" data-debug-id="DQ-CMD-HISTORY-CLEAR" onclick="clearHistory()">clear</button>
      </div>
      <ul id="dq-history-list" data-debug-id="DQ-CMD-HISTORY-LIST"></ul>
    </div>

  </section>

  <!-- ── LOG Panel ──────────────────────────────────────── -->
  <section id="dq-log" data-debug-id="DQ-LOG">

    <div id="dq-log-toolbar" data-debug-id="DQ-LOG-TOOLBAR">
      <button class="btn sm" id="dq-log-pause-btn" data-debug-id="DQ-LOG-PAUSE" onclick="togglePause()">⏸ Pause</button>
      <button class="btn sm" data-debug-id="DQ-LOG-CLEAR" onclick="clearLog()">✕ Clear</button>
      <input id="dq-log-filter" data-debug-id="DQ-LOG-FILTER"
             type="text" placeholder="filter output…" oninput="applyFilter()" />
      <span id="dq-log-count" data-debug-id="DQ-LOG-COUNT">0 lines</span>
    </div>

    <div id="dq-log-output" data-debug-id="DQ-LOG-OUTPUT"></div>

  </section>

</main>

<!-- ════════════════════════════════════════ STATUS BAR -->
<footer id="dq-status" data-debug-id="DQ-STATUS">
  <div id="dq-status-fields" data-debug-id="DQ-STATUS-FIELDS"></div>
</footer>

<script>
// ════════════════════════════════════════════════════════════════════════════
// Dev/QA — device-agnostic command/log tool
// Debug ID schema: DQ-{PANEL}-{ELEMENT}
// All DOM writes use textContent / createElement — no innerHTML with external data.
// ════════════════════════════════════════════════════════════════════════════

// ── State ─────────────────────────────────────────────────────────────────
let _ws        = null;
let _paused    = false;
let _transport = 'auto';
let _history   = [];       // command history, most-recent first
let _histIdx   = -1;
let _logLines  = [];       // {dir, dirClass, body, bodyClass} entries
let _logCount  = 0;
let _deviceId  = null;
const MAX_LOG  = 500;

// Default palette — device-agnostic.
// Future devices extend this via GET /api/devqa_palette → { commands: [...] }
const DEFAULT_PALETTE = [
  'STATUS', 'RESET',
  'SCHED LIST', 'SCHED CLEAR',
  'GPIO 6 HIGH', 'GPIO 6 LOW',
  'GPIO 7 HIGH', 'GPIO 7 LOW',
  'LORA STATUS', 'WIFI STATUS', 'LOG',
];

// ── Boot ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  buildPalette(DEFAULT_PALETTE);
  wsConnect();
  await loadDevices();
  await loadTransportStatus();
  loadDevicePalette();   // silent — only replaces palette if device exposes it
  document.getElementById('dq-cmd-input').focus();
});

// ── WebSocket ─────────────────────────────────────────────────────────────
function wsConnect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  _ws = new WebSocket(`${proto}://${location.host}/ws`);

  _ws.onopen = () => {
    setBadge('dq-ws-badge', 'ok', 'WS ●');
    logSys('WebSocket connected');
  };
  _ws.onclose = () => {
    setBadge('dq-ws-badge', 'err', 'WS ○');
    logSys('WebSocket closed — retry in 3s…');
    setTimeout(wsConnect, 3000);
  };
  _ws.onerror = () => setBadge('dq-ws-badge', 'err', 'WS ✗');

  _ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { logIn(e.data); return; }

    const t = msg.type || 'msg';
    let logText = '';

    if (t === 'status') {
      renderStatus(msg);
      logText = '[status] transport=' + (msg.transport || '?') +
                ' http=' + msg.http_ok + ' ble=' + msg.ble_ok +
                (msg.last_cmd ? ' last_cmd=' + msg.last_cmd : '');
      logIn(logText);
    } else if (t === 'serial_hello') {
      logText = '[serial:hello] port=' + msg.port + ' device=' + (msg.device || '?') + ' fw=' + (msg.fw || '?');
      logIn(logText);
    } else if (t === 'serial_sensor') {
      logText = '[serial:sensor] port=' + msg.port + ' ' + safeJson(msg);
      logIn(logText);
    } else {
      // Show all types raw — future devices broadcast arbitrary message types
      logText = '[' + t + '] ' + safeJson(msg);
      logIn(logText);
    }

    // If we're waiting for the device response after a command, capture it and fire recommendation
    if (_pendingRecommend && logText) {
      _pendingRecommend = false;
      _lastResponse = logText;
      fetchRecommendation(_lastCmd, _lastResponse);
    }
  };
}

// ── Transport ─────────────────────────────────────────────────────────────
function setTransport(tp, btn) {
  _transport = tp;
  document.querySelectorAll('.tp-pills .btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  logSys('Transport: ' + tp);
}

async function loadTransportStatus() {
  try {
    const r = await fetch('/api/transport');
    if (!r.ok) return;
    const d = await r.json();
    const t = d.active || d.transport || 'unknown';
    setBadge('dq-transport-badge', t !== 'unknown' ? 'ok' : 'unk', 'transport: ' + t);
  } catch {}
}

// ── Device selector ───────────────────────────────────────────────────────
async function loadDevices() {
  try {
    const r = await fetch('/api/nodes');
    if (!r.ok) return;
    const d = await r.json();
    const nodes = d.nodes || d || [];
    const sel = document.getElementById('dq-device-select');
    while (sel.options.length > 1) sel.remove(1);
    nodes.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n.id || n.address;
      opt.textContent = (n.name || n.id) + ' (' + (n.type || n.address) + ')';
      sel.appendChild(opt);
    });
    if (sel.options.length === 1) {
      // No nodes registered — add generic primary
      const opt = document.createElement('option');
      opt.value = '__primary__';
      opt.textContent = 'Primary device';
      sel.appendChild(opt);
      sel.value = '__primary__';
      _deviceId = '__primary__';
    }
  } catch {}
}

function onDeviceChange(val) {
  _deviceId = val || null;
  logSys('Device: ' + (val || 'none'));
}

// ── Command send ──────────────────────────────────────────────────────────
// Tracks last cmd/response pair for the AI recommendation call.
// _pendingRecommend is set true after a command is sent; the next WS
// status message is captured as the device response, then recommendation fires.
let _lastCmd = '';
let _lastResponse = '';
let _pendingRecommend = false;

async function sendCmd() {
  const input = document.getElementById('dq-cmd-input');
  const cmd = input.value.trim();
  if (!cmd) return;

  input.value = '';
  _histIdx = -1;
  addToHistory(cmd);
  logOut(cmd);
  _lastCmd = cmd;
  _lastResponse = '';

  try {
    const body = { cmd };
    if (_transport !== 'auto') body.transport = _transport;
    if (_deviceId && _deviceId !== '__primary__') body.device = _deviceId;

    const r = await fetch('/api/cmd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const text = await r.text();
    if (!r.ok) {
      logErr('cmd failed (' + r.status + '): ' + text);
    } else {
      // Flag that the next WS message is the device response to this command
      _pendingRecommend = true;
      // Safety fallback: if no WS response arrives in 5s, fire anyway
      setTimeout(() => {
        if (_pendingRecommend) {
          _pendingRecommend = false;
          fetchRecommendation(_lastCmd, _lastResponse);
        }
      }, 5000);
    }
  } catch (err) {
    logErr('send error: ' + err.message);
  }
}

// ── AI recommendation ──────────────────────────────────────────────────────
async function fetchRecommendation(cmd, response) {
  const spinner = document.getElementById('dq-suggest-spinner');
  const cmdEl   = document.getElementById('dq-suggest-cmd');
  const reasonEl= document.getElementById('dq-suggest-reason');

  spinner.style.display = 'inline';
  try {
    const r = await fetch('/api/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cmd,
        response,
        // Send last 10 history entries as {cmd} objects for context
        history: _history.slice(0, 10).map(c => ({ cmd: c })),
      }),
    });
    if (!r.ok) return;
    const d = await r.json();
    if (d.command) {
      cmdEl.textContent    = d.command;    // safe — textContent
      reasonEl.textContent = d.reason || '';
    }
  } catch {}
  finally {
    spinner.style.display = 'none';
  }
}

function useSuggestion() {
  const cmd = document.getElementById('dq-suggest-cmd').textContent;
  if (!cmd || cmd === '—') return;
  document.getElementById('dq-cmd-input').value = cmd;
  document.getElementById('dq-cmd-input').focus();
}

function onCmdKey(e) {
  if (e.key === 'Enter') { sendCmd(); return; }
  const input = document.getElementById('dq-cmd-input');
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (_histIdx < _history.length - 1) input.value = _history[++_histIdx];
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (_histIdx > 0) { input.value = _history[--_histIdx]; }
    else { _histIdx = -1; input.value = ''; }
  }
}

// ── History ───────────────────────────────────────────────────────────────
function addToHistory(cmd) {
  const existing = _history.indexOf(cmd);
  if (existing !== -1) _history.splice(existing, 1);
  _history.unshift(cmd);
  if (_history.length > 50) _history.pop();
  renderHistory();
}

function renderHistory() {
  const ul = document.getElementById('dq-history-list');
  // Remove all children safely
  while (ul.firstChild) ul.removeChild(ul.firstChild);
  _history.forEach(cmd => {
    const li = document.createElement('li');
    li.textContent = cmd;     // textContent — safe
    li.title = cmd;
    li.onclick = () => {
      document.getElementById('dq-cmd-input').value = cmd;
      document.getElementById('dq-cmd-input').focus();
    };
    ul.appendChild(li);
  });
}

function clearHistory() {
  _history = [];
  _histIdx = -1;
  renderHistory();
}

// ── Quick palette ─────────────────────────────────────────────────────────
function buildPalette(cmds) {
  const grid = document.getElementById('dq-palette-grid');
  while (grid.firstChild) grid.removeChild(grid.firstChild);
  cmds.forEach((cmd, i) => {
    const btn = document.createElement('button');
    btn.className = 'palette-btn';
    btn.setAttribute('data-debug-id', 'DQ-CMD-PAL-' + i);
    btn.textContent = cmd;    // textContent — safe
    btn.title = cmd;
    btn.onclick = () => {
      document.getElementById('dq-cmd-input').value = cmd;
      sendCmd();
    };
    grid.appendChild(btn);
  });
}

async function loadDevicePalette() {
  // Future devices expose GET /api/devqa_palette → { commands: ["CMD1", ...] }
  // Silently ignored if not available.
  try {
    const r = await fetch('/api/devqa_palette');
    if (!r.ok) return;
    const d = await r.json();
    if (Array.isArray(d.commands) && d.commands.length) {
      // Validate: only accept string commands
      const safe = d.commands.filter(c => typeof c === 'string' && c.length < 80);
      buildPalette(safe);
      logSys('Device palette loaded: ' + safe.length + ' commands');
    }
  } catch {}
}

// ── Log output ────────────────────────────────────────────────────────────
function ts() {
  return new Date().toTimeString().slice(0, 8);
}

function appendLog(dir, dirClass, body, bodyClass) {
  if (_logCount >= MAX_LOG) {
    const out = document.getElementById('dq-log-output');
    if (out.firstChild) out.removeChild(out.firstChild);
    _logLines.shift();
  }
  const entry = { dir, dirClass, body, bodyClass };
  _logLines.push(entry);
  _logCount++;

  if (!_paused) {
    const filter = document.getElementById('dq-log-filter').value.toLowerCase();
    _appendLogRow(entry, filter);
  }
  updateLogCount();
}

function _appendLogRow(entry, filter) {
  const out = document.getElementById('dq-log-output');
  const row = document.createElement('div');
  row.className = 'log-line';

  const tsEl   = document.createElement('span');
  tsEl.className = 'log-ts';
  tsEl.textContent = ts();

  const dirEl  = document.createElement('span');
  dirEl.className = 'log-dir ' + entry.dirClass;
  dirEl.textContent = entry.dir;

  const bodyEl = document.createElement('span');
  bodyEl.className = 'log-body' + (entry.bodyClass ? ' ' + entry.bodyClass : '');
  bodyEl.textContent = entry.body;   // textContent — safe even with device data

  row.append(tsEl, dirEl, bodyEl);

  if (filter && !(entry.dir + ' ' + entry.body).toLowerCase().includes(filter)) {
    row.classList.add('hidden');
  }

  out.appendChild(row);
  out.scrollTop = out.scrollHeight;
}

function logOut(body) { appendLog('→', 'out', body, 'cmd'); }
function logIn(body)  { appendLog('←', 'in',  body, ''); }
function logSys(body) { appendLog('·', 'sys', body, ''); }
function logErr(body) { appendLog('!', 'err', body, ''); }

function updateLogCount() {
  const visible = document.querySelectorAll('#dq-log-output .log-line:not(.hidden)').length;
  document.getElementById('dq-log-count').textContent = visible + ' / ' + _logCount;
}

function togglePause() {
  _paused = !_paused;
  const btn = document.getElementById('dq-log-pause-btn');
  btn.textContent = _paused ? '▶ Resume' : '⏸ Pause';
  btn.classList.toggle('active', _paused);
  if (!_paused) {
    // Flush all buffered entries
    const out = document.getElementById('dq-log-output');
    while (out.firstChild) out.removeChild(out.firstChild);
    const filter = document.getElementById('dq-log-filter').value.toLowerCase();
    _logLines.forEach(e => _appendLogRow(e, filter));
  }
}

function clearLog() {
  _logLines = [];
  _logCount = 0;
  const out = document.getElementById('dq-log-output');
  while (out.firstChild) out.removeChild(out.firstChild);
  updateLogCount();
}

function applyFilter() {
  const filter = document.getElementById('dq-log-filter').value.toLowerCase();
  const rows = document.querySelectorAll('#dq-log-output .log-line');
  rows.forEach((row, i) => {
    const entry = _logLines[i];
    if (!entry) return;
    const text = entry.dir + ' ' + entry.body;
    row.classList.toggle('hidden', !!filter && !text.toLowerCase().includes(filter));
  });
  updateLogCount();
}

// ── Status bar ────────────────────────────────────────────────────────────
const STATUS_SKIP = new Set(['type', 'peer', 'log', 'pins', 'nodes', 'mesh']);

function renderStatus(d) {
  const fields = document.getElementById('dq-status-fields');
  while (fields.firstChild) fields.removeChild(fields.firstChild);

  // Render whatever the device returns — not hardcoded to any device type.
  const entries = Object.entries(d)
    .filter(([k]) => !STATUS_SKIP.has(k))
    .slice(0, 14);

  entries.forEach(([k, v]) => {
    const val = typeof v === 'object' ? safeJson(v) : String(v);
    const sf  = document.createElement('span');
    sf.className = 'sf';

    const keyEl = document.createElement('span');
    keyEl.className = 'sf-key';
    keyEl.textContent = k;        // safe

    const valEl = document.createElement('span');
    const isOk = (k === 'http_ok' || k === 'ble_ok');
    valEl.className = 'sf-val' + (isOk ? (v ? ' ok' : ' err') : '');
    valEl.textContent = val;      // safe

    sf.append(keyEl, valEl);
    fields.appendChild(sf);
  });

  // Mirror transport to header badge
  if (d.transport) setBadge('dq-transport-badge', 'ok', 'transport: ' + d.transport);
}

// ── Debug ID toggle ───────────────────────────────────────────────────────
function toggleDebugIds() {
  const on = document.body.classList.toggle('debug-ids');
  document.getElementById('dq-debug-btn').classList.toggle('active', on);
  logSys('Debug IDs: ' + (on ? 'ON' : 'OFF'));
}

// ── Helpers ───────────────────────────────────────────────────────────────
function setBadge(id, state, text) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;          // safe
  el.className = 'badge ' + state;
}

function safeJson(v) {
  try { return JSON.stringify(v); } catch { return String(v); }
}
