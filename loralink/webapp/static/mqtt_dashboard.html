<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoRaLink Swarm Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
      :root {
        --bg: #0a0b10;
        --card-bg: rgba(20, 22, 32, 0.7);
        --primary: #00f2ff;
        --accent: #7000ff;
        --success: #00ff88;
        --danger: #ff4d4d;
        --text: #e0e0e0;
        --text-dim: #909090;
        --glass: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-font-smoothing: antialiased;
      }

      body {
        background-color: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        overflow-x: hidden;
        min-height: 100vh;
        background-image:
          radial-gradient(
            circle at 20% 20%,
            rgba(112, 0, 255, 0.05) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 242, 255, 0.05) 0%,
            transparent 40%
          );
      }

      /* ── Header ────────────────────────────────────────────────── */
      header {
        padding: 1rem 3rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(10, 11, 16, 0.85);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .nav-links {
        display: flex;
        gap: 1.5rem;
        margin-left: 2rem;
        flex: 1;
      }

      .nav-links a {
        color: var(--text-dim);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: color 0.2s;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .nav-links a:hover {
        color: var(--primary);
      }

      .nav-links a.active {
        color: var(--primary);
        font-weight: 600;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, var(--primary), var(--accent));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .conn-status {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem 1rem;
        background: var(--glass);
        border-radius: 100px;
        font-size: 0.85rem;
        border: 1px solid var(--border);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--danger);
        box-shadow: 0 0 10px var(--danger);
      }

      .status-dot.online {
        background: var(--success);
        box-shadow: 0 0 10px var(--success);
      }

      /* ── Main Layout ────────────────────────────────────────────── */
      main {
        padding: 2rem 3rem;
        display: grid;
        grid-template-columns: 1fr 400px;
        gap: 2rem;
        max-width: 1800px;
        margin: 0 auto;
      }

      @media (max-width: 1200px) {
        main {
          grid-template-columns: 1fr;
        }
      }

      /* ── Node Grid ──────────────────────────────────────────────── */
      .section-title {
        font-size: 0.9rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--text-dim);
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .node-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
      }

      .node-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.5rem;
        position: relative;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }

      .node-card:hover {
        transform: translateY(-5px);
        border-color: rgba(0, 242, 255, 0.3);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .node-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--text-dim);
      }

      .node-card.online::before {
        background: var(--success);
      }
      .node-card.offline::before {
        background: var(--danger);
      }

      .node-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 1.5rem;
      }

      .node-id {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
      }

      .node-status-badge {
        font-size: 0.65rem;
        font-weight: 700;
        padding: 0.25rem 0.6rem;
        border-radius: 4px;
        background: var(--glass);
        text-transform: uppercase;
      }

      .node-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .stat-item {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .stat-label {
        font-size: 0.65rem;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .stat-value {
        font-size: 1.1rem;
        font-weight: 600;
      }

      .node-actions {
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 0.75rem;
      }

      /* ── Sidebar ───────────────────────────────────────────────── */
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 2rem;
        height: calc(100vh - 120px);
        position: sticky;
        top: 100px;
      }

      .panel {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }

      .log-panel {
        flex: 1;
        min-height: 0;
      }

      .log-container {
        flex: 1;
        overflow-y: auto;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding-right: 0.5rem;
      }

      .log-entry {
        padding: 0.5rem;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
        border-left: 3px solid transparent;
      }

      .log-entry.telemetry {
        border-left-color: var(--primary);
      }
      .log-entry.message {
        border-left-color: var(--success);
      }
      .log-entry.cmd {
        border-left-color: var(--accent);
      }

      .log-time {
        color: var(--text-dim);
        font-size: 0.7rem;
      }
      .log-msg {
        color: var(--text);
      }

      /* ── Controls ──────────────────────────────────────────────── */
      .input-group {
        position: relative;
        margin-bottom: 1rem;
      }

      input,
      select {
        width: 100%;
        background: var(--glass);
        border: 1px solid var(--border);
        padding: 0.75rem 1rem;
        border-radius: 12px;
        color: var(--text);
        font-family: inherit;
        outline: none;
        transition: all 0.2s;
      }

      input:focus {
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.08);
      }

      .btn {
        padding: 0.75rem 1.5rem;
        border-radius: 12px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--accent));
        color: #000;
      }

      .btn-primary:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
      }

      .btn-danger {
        background: rgba(255, 77, 77, 0.1);
        color: var(--danger);
        border: 1px solid rgba(255, 77, 77, 0.2);
      }
      .btn-danger:hover {
        background: var(--danger);
        color: #000;
      }

      .btn-small {
        padding: 0.4rem 0.8rem;
        font-size: 0.75rem;
        border-radius: 8px;
      }

      /* ── Scrollbars ────────────────────────────────────────────── */
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-dim);
      }

      /* ── Toasts ────────────────────────────────────────────────── */
      .toast-container {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        z-index: 1000;
      }

      .toast {
        background: rgba(20, 22, 32, 0.9);
        border: 1px solid var(--border);
        border-left: 4px solid var(--primary);
        padding: 1rem 1.5rem;
        border-radius: 12px;
        color: var(--text);
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .toast.success {
        border-left-color: var(--success);
      }
      .toast.danger {
        border-left-color: var(--danger);
      }
      .toast.cmd {
        border-left-color: var(--accent);
      }
      .dbg-id { position: absolute; right: 8px; top: 8px; font-size: 10px; color: #555; opacity: 0.6; pointer-events: none; font-family: monospace; letter-spacing: 0.5px; z-index: 100; }
      /* Status Icons & Indicators */
      .status-icon { transition: color 0.3s; }
      .node-card.online .status-icon { color: var(--primary); }
      .node-card.offline .status-icon { color: var(--text-dim); }
      .stat-icon { font-size: 0.8rem; margin-right: 5px; }
      .mt-1 { margin-top: 1rem; }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <span class="dbg-id">MQ-LOGO</span>
        <i class="fas fa-tower-broadcast"></i>
        <span>LoRaLink</span>
      </div>

      <nav class="nav-links">
        <span class="dbg-id">MQ-NAV</span>
        <a href="/"><i class="fas fa-satellite-dish"></i> Fleet</a>
        <a href="/static/mqtt_dashboard.html" class="active"
          ><i class="fas fa-microchip"></i> Swarm</a
        >
        <a href="/?page=hardware"><i class="fas fa-tools"></i> Hardware</a>
        <a href="/?page=admin"><i class="fas fa-shield-halved"></i> Admin</a>
        <a href="/devqa"><i class="fas fa-bug"></i> Dev / QA</a>
      </nav>

      <div class="conn-status">
        <span class="dbg-id">MQ-BROKER-STATUS</span>
        <div id="mqtt-dot" class="status-dot"></div>
        <span id="mqtt-text">Broker: Disconnected</span>
      </div>
    </header>

    <div id="toast-container" class="toast-container"></div>

    <main>
      <div class="content">
        <div class="section-title">
          <i class="fas fa-microchip"></i>
          Active Swarm Nodes
        </div>
        <div id="node-grid" class="node-grid">
          <span class="dbg-id">MQ-NODE-GRID</span>
          <!-- Nodes dynamically inserted here -->
        </div>
      </div>

      <div class="sidebar">
        <div class="panel"><span class="dbg-id">MQ-BROADCAST-PANEL</span>
          <div class="section-title">
            <i class="fas fa-terminal"></i>
            Broadcast Console
          </div>
          <div class="input-group">
            <input
              type="text"
              id="global-cmd"
              placeholder="Enter command (e.g., RESTART)"
            />
          </div>
          <button class="btn btn-primary" onclick="sendBroadcast()">
            <i class="fas fa-paper-plane"></i>
            Broadcast to All Nodes
          </button>
        </div>

        <div class="panel log-panel"><span class="dbg-id">MQ-TRACE-LOG</span>
          <div class="section-title">
            <i class="fas fa-list-ul"></i>
            Live Swarm Log
          </div>
          <div id="log-container" class="log-container">
            <div class="log-entry">Waiting for data...</div>
          </div>
          <button
            class="btn btn-danger btn-small mt-1"
            onclick="clearLogs()"
          >
            <i class="fas fa-trash"></i>
            Clear Log
          </button>
        </div>
      </div>
    </main>

    <script>
      // ── Configuration ───────────────────────────────────────────
      // We assume EMQX is running on the same host as the webserver
      const MQTT_CONFIG = {
        host: window.location.hostname || "localhost",
        port: 8083, // EMQX WebSocket Port
        path: "/mqtt",
      };

      let client;
      try {
        client = mqtt.connect(
          `ws://${MQTT_CONFIG.host}:${MQTT_CONFIG.port}${MQTT_CONFIG.path}`,
        );
      } catch (e) {
        console.error("MQTT Connection failed", e);
      }

      const nodes = new Map(); // Store state of each node

      // ── MQTT Handlers ───────────────────────────────────────────
      if (client) {
        client.on("connect", () => {
          console.log("Connected to MQTT Broker");
          document.getElementById("mqtt-dot").classList.add("online");
          document.getElementById("mqtt-text").innerText =
            `Broker: ${MQTT_CONFIG.host}`;

          // Subscribe to all topics for monitoring
          client.subscribe("loralink/telemetry/#");
          client.subscribe("loralink/msg/#");
          client.subscribe("loralink/status/#");

          addLog("System", "Connected to EMQX Broker", "cmd");
        });

        client.on("message", (topic, payload) => {
          const msg = payload.toString();
          const parts = topic.split("/");
          const type = parts[1]; // telemetry, msg, status
          const id = parts[2];

          if (type === "telemetry") {
            handleTelemetry(id, msg);
          } else if (type === "msg") {
            handleMessage(id, msg);
          } else if (type === "status") {
            handleStatus(id, msg);
          }
        });
      }

      // ── Business Logic ───────────────────────────────────────────
      function handleTelemetry(id, dataJson) {
        try {
          const data = JSON.parse(dataJson);
          updateNode(id, {
            battery: data.battery.toFixed(2) + "V",
            rssi: data.rssi + " dBm",
            hops: data.hops,
            lastSeen: new Date().toLocaleTimeString(),
          });
          addLog(
            id,
            `Telemetry: Bat=${data.battery.toFixed(2)}V, RSSI=${data.rssi}`,
            "telemetry",
          );
        } catch (e) {
          console.error(e);
        }
      }

      function handleMessage(id, dataJson) {
        try {
          const data = JSON.parse(dataJson);
          addLog(id, `[MSG] ${data.text}`, "message");
        } catch (e) {
          // Fallback for raw strings
          addLog(id, `[RAW] ${dataJson}`, "message");
        }
      }

      function handleStatus(id, status) {
        updateNode(id, { status: status });
        addLog(id, `Node is now ${status}`, "cmd");
      }

      function updateNode(id, data) {
        if (!nodes.has(id)) {
          nodes.set(id, {
            id,
            status: "ONLINE",
            battery: "---",
            rssi: "---",
            hops: 0,
            lastSeen: "---",
          });
        }
        const node = nodes.get(id);
        Object.assign(node, data);
        renderNode(node);
      }

      function renderNode(node) {
        let card = document.getElementById(`node-${node.id}`);
        if (!card) {
          card = document.createElement("div");
          card.id = `node-${node.id}`;
          document.getElementById("node-grid").appendChild(card);
        }

        const isOnline = node.status === "ONLINE";
        card.className = `node-card ${isOnline ? "online" : "offline"}`;
        card.innerHTML = `
                <div class="node-header">
                    <div>
                        <div class="node-id"><span class="dbg-id">MQ-NODE-${node.id}</span>${node.id}</div>
                        <div class="node-status-badge">${node.status}</div>
                    </div>
                    <i class="fas fa-location-arrow status-icon"></i>
                </div>
                <div class="node-stats">
                    <div class="stat-item">
                        <span class="stat-label">Battery</span>
                        <span class="stat-value"><i class="fas fa-battery-half stat-icon"></i>${node.battery}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">RSSI</span>
                        <span class="stat-value"><i class="fas fa-signal stat-icon"></i>${node.rssi}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Hops</span>
                        <span class="stat-value">${node.hops}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Seen</span>
                        <span class="stat-value" style="font-size: 0.8rem;">${node.lastSeen}</span>
                    </div>
                </div>
                <div class="node-actions">
                    <button class="btn btn-primary btn-small" onclick="sendCommand('${node.id}', 'PING')">Ping</button>
                    <button class="btn btn-danger btn-small" onclick="sendCommand('${node.id}', 'RESTART')">Reset</button>
                </div>
            `;
      }

      function sendCommand(id, cmd) {
        if (!client) {
          showToast("Not connected to broker", "danger");
          return;
        }
        const topic = `loralink/cmd/${id}`;
        client.publish(topic, cmd);
        addLog("System", `Sent ${cmd} to ${id}`, "cmd");
        showToast(`Sent ${cmd} to ${id}`, "cmd");
      }

      function sendBroadcast() {
        if (!client) {
          showToast("Not connected to broker", "danger");
          return;
        }
        const cmd = document.getElementById("global-cmd").value;
        if (!cmd) return;
        client.publish("loralink/cmd/all", cmd);
        addLog("System", `BROADCAST: ${cmd}`, "cmd");
        showToast(`Broadcast: ${cmd}`, "cmd");
        document.getElementById("global-cmd").value = "";
      }

      function showToast(msg, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;

        const icon =
          type === "danger"
            ? "exclamation-circle"
            : type === "cmd"
              ? "paper-plane"
              : "check-circle";
        toast.innerHTML = `
                <i class="fas fa-${icon}"></i>
                <span>${msg}</span>
            `;

        container.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateX(100%)";
          toast.style.transition = "all 0.3s";
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      function addLog(id, msg, type) {
        const container = document.getElementById("log-container");
        const entry = document.createElement("div");
        entry.className = `log-entry ${type}`;
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `
                <div class="log-time">${time} &middot; ${id}</div>
                <div class="log-msg">${msg}</div>
            `;
        container.prepend(entry);

        // Limit logs
        if (container.children.length > 50) {
          container.removeChild(container.lastChild);
        }
      }

      function clearLogs() {
        document.getElementById("log-container").innerHTML = "";
      }
    </script>
  </body>
</html>
