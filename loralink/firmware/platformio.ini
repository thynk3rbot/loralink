;  (c) 2026 Steven P Williams (spw1.com)
; ============================================================================

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Versioning is manual only — update src/config.h FIRMWARE_VERSION when deploying meaningful changes
; extra_scripts = pre:increment_version.py

; Libraries
lib_deps =
    heltecautomation/Heltec ESP32 Dev-Boards @ ^1.1.2
    jgromes/RadioLib @ ^6.4.0
    bblanchon/ArduinoJson @ ^7.0.4
    arkhipenko/TaskScheduler @ ^3.7.0
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    knolleary/PubSubClient @ ^2.8
    adafruit/Adafruit MCP23017 Arduino Library @ ^2.3.0

; Library Dependency Finder
lib_ldf_mode = deep+

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -D ARDUINO_LORA_HELTEC_V3
    -D SUPPORT_WIFI
    -D SUPPORT_BLE
    -D SUPPORT_ESPNOW
    -D _TASK_INLINE
    -std=gnu++17

; Serial Monitor
monitor_filters = esp32_exception_decoder

; Memory
board_build.partitions = min_spiffs.csv

; OTA environment for SLAVE — 172.16.0.26
[env:ota_slave]
extends = env:heltec_wifi_lora_32_V3
upload_protocol = espota
upload_port = 172.16.0.26

; OTA environment for MASTER — 172.16.0.27
[env:ota_master]
extends = env:heltec_wifi_lora_32_V3
upload_protocol = espota
upload_port = 172.16.0.27

; OTA environment for SLAVE (shifted) — 172.16.0.29
[env:ota_slave_29]
extends = env:heltec_wifi_lora_32_V3
upload_protocol = espota
upload_port = 172.16.0.29

; ── Seeeduino XIAO Satellite ─────────────────────────────────────────────────
[env:xiao_satellite]
platform = atmelsam
board = seeed_xiao
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<../tools/xiao_satellite/xiao_satellite.cpp>

